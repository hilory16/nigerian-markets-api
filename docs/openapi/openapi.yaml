openapi: 3.1.0
info:
  title: Iya Oloja API
  version: 1.0.0
  summary: Open data API for Nigerian markets
  description: |
    Iya Oloja is a free JSON API for discovering markets across all 36 states of Nigeria and the FCT.
    The API is read-only except for the contribution endpoint, which creates a GitHub issue for review.
servers:
  - url: https://iya-oloja.pages.dev
    description: Production
tags:
  - name: States
  - name: LGAs
  - name: Markets
  - name: Search
  - name: Contributions
paths:
  /api:
    get:
      tags:
        - States
      summary: Get the API index
      operationId: getApiIndex
      responses:
        "200":
          description: High-level API metadata and endpoint discovery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiIndexResponse"
  /api/states:
    get:
      tags:
        - States
      summary: List all states
      operationId: listStates
      responses:
        "200":
          description: A list of all Nigerian states and the FCT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatesResponse"
              example:
                success: true
                data:
                  - id: 1
                    name: Abia
                    slug: abia
                  - id: 25
                    name: Lagos
                    slug: lagos
  /api/states/{state}:
    get:
      tags:
        - States
      summary: Get a state by slug
      operationId: getStateBySlug
      parameters:
        - name: state
          in: path
          required: true
          description: State slug
          schema:
            type: string
          example: lagos
      responses:
        "200":
          description: A state with its LGAs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateDetailResponse"
              example:
                success: true
                data:
                  id: 25
                  name: Lagos
                  slug: lagos
                  lgas:
                    - id: 100
                      state_id: 25
                      name: Eti-Osa
                      slug: lagos-eti-osa
                    - id: 101
                      state_id: 25
                      name: Lagos Island
                      slug: lagos-lagos-island
        "404":
          description: The state slug does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: State not found
                  code: NOT_FOUND
  /api/lgas/{lga}:
    get:
      tags:
        - LGAs
      summary: Get an LGA by slug
      operationId: getLgaBySlug
      parameters:
        - name: lga
          in: path
          required: true
          description: LGA slug
          schema:
            type: string
          example: lagos-eti-osa
      responses:
        "200":
          description: An LGA with its parent state and all markets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LgaDetailResponse"
              example:
                success: true
                data:
                  id: 100
                  state_id: 25
                  name: Eti-Osa
                  slug: lagos-eti-osa
                  state:
                    id: 25
                    name: Lagos
                    slug: lagos
                  markets:
                    - id: 1
                      lga_id: 100
                      name: Lekki Market, Eti-Osa
                      slug: lekki-market
                      lat: 6.4698
                      lng: 3.5852
                      added_by: ifihan
        "404":
          description: The LGA slug does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: LGA not found
                  code: NOT_FOUND
  /api/markets:
    get:
      tags:
        - Markets
      summary: List markets
      operationId: listMarkets
      parameters:
        - name: limit
          in: query
          required: false
          description: Number of results to return. Values are clamped to the 1-100 range.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          description: Number of results to skip.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: order
          in: query
          required: false
          description: Sort order by market name.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        "200":
          description: Paginated market list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketsResponse"
              example:
                success: true
                data:
                  - id: 1
                    lga_id: 100
                    name: Ajah Market, Eti-Osa
                    slug: ajah-market
                    lat: 6.4698
                    lng: 3.5986
                    added_by: ifihan
                    lga_name: Eti-Osa
                    lga_slug: lagos-eti-osa
                    state_name: Lagos
                    state_slug: lagos
                meta:
                  total: 400
                  limit: 20
                  offset: 0
  /api/search:
    get:
      tags:
        - Search
      summary: Search markets, LGAs, and states
      operationId: searchMarkets
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string. Empty queries are rejected. Maximum length is 100 characters.
          schema:
            type: string
            minLength: 1
            maxLength: 100
          example: balogun
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                success: true
                data:
                  - id: 22
                    lga_id: 101
                    name: Balogun Market, Lagos Island
                    slug: balogun-market
                    lat: 6.4541
                    lng: 3.3947
                    added_by: ifihan
                    lga_name: Lagos Island
                    lga_slug: lagos-lagos-island
                    state_name: Lagos
                    state_slug: lagos
        "400":
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingQuery:
                  summary: Missing q
                  value:
                    success: false
                    error:
                      message: Query parameter "q" is required
                      code: BAD_REQUEST
                queryTooLong:
                  summary: Query too long
                  value:
                    success: false
                    error:
                      message: Query too long
                      code: BAD_REQUEST
  /api/contribute:
    post:
      tags:
        - Contributions
      summary: Submit a market for review
      operationId: createContribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContributionRequest"
            example:
              market_name: Balogun Market, Lagos Island
              state: Lagos
              lga: Lagos Island
              lat: 6.4541
              lng: 3.3947
              description: One of the largest markets in Lagos
              contributor_name: your-github-username
      responses:
        "201":
          description: Submission accepted and converted into a GitHub issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionResponse"
              example:
                success: true
                data:
                  issue_url: https://github.com/ifihan/nigerian-markets-api/issues/123
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: market_name, state, and lga are required
                  code: BAD_REQUEST
        "502":
          description: GitHub issue creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Failed to create submission
                  code: UPSTREAM_ERROR
        "503":
          description: GitHub submission service is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: Contribution service unavailable
                  code: SERVICE_UNAVAILABLE
components:
  schemas:
    ApiIndexResponse:
      type: object
      required:
        - name
        - description
        - version
        - endpoints
        - docs
        - github
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        endpoints:
          type: object
          required:
            - states
            - state
            - lgas
            - markets
            - search
            - contribute
          properties:
            states:
              type: string
            state:
              type: string
            lgas:
              type: string
            markets:
              type: string
            search:
              type: string
            contribute:
              type: string
        docs:
          type: string
        github:
          type: string
    State:
      type: object
      required:
        - id
        - name
        - slug
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
    Lga:
      type: object
      required:
        - id
        - state_id
        - name
        - slug
      properties:
        id:
          type: integer
        state_id:
          type: integer
        name:
          type: string
        slug:
          type: string
    Market:
      type: object
      required:
        - id
        - lga_id
        - name
        - slug
        - lat
        - lng
        - added_by
      properties:
        id:
          type: integer
        lga_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        lat:
          type:
            - number
            - "null"
        lng:
          type:
            - number
            - "null"
        added_by:
          type:
            - string
            - "null"
    MarketSearchResult:
      allOf:
        - $ref: "#/components/schemas/Market"
        - type: object
          required:
            - lga_name
            - lga_slug
            - state_name
            - state_slug
          properties:
            lga_name:
              type: string
            lga_slug:
              type: string
            state_name:
              type: string
            state_slug:
              type: string
    StateDetail:
      allOf:
        - $ref: "#/components/schemas/State"
        - type: object
          required:
            - lgas
          properties:
            lgas:
              type: array
              items:
                $ref: "#/components/schemas/Lga"
    LgaDetail:
      allOf:
        - $ref: "#/components/schemas/Lga"
        - type: object
          required:
            - state
            - markets
          properties:
            state:
              $ref: "#/components/schemas/State"
            markets:
              type: array
              items:
                $ref: "#/components/schemas/Market"
    StatesResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/State"
    StateDetailResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/StateDetail"
    LgaDetailResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/LgaDetail"
    MarketsResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketSearchResult"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    SearchResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketSearchResult"
    PaginationMeta:
      type: object
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    ContributionRequest:
      type: object
      required:
        - market_name
        - state
        - lga
      properties:
        market_name:
          type: string
        state:
          type: string
        lga:
          type: string
        lat:
          type: number
        lng:
          type: number
        description:
          type: string
        contributor_name:
          type: string
    ContributionResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - issue_url
          properties:
            issue_url:
              type: string
              format: uri
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
            code:
              type: string
